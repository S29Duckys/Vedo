<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selection | Pure Matte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-matte: #0a0a0a;
        --card-matte: #121212;
        --border-soft: rgba(255, 255, 255, 0.05);
      }

      body {
        background-color: var(--bg-matte);
        color: #ffffff;
        font-family: "Outfit", sans-serif;
        overflow-x: hidden;
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Lueurs blanches mates (très diffuses) */
      .glow {
        position: fixed;
        width: 80vw;
        height: 80vw;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.03) 0%,
          rgba(255, 255, 255, 0) 60%
        );
        border-radius: 50%;
        pointer-events: none;
        filter: blur(100px);
      }
      .glow-top {
        top: -40%;
        left: -20%;
      }
      .glow-bottom {
        bottom: -40%;
        right: -20%;
      }

      /* Style Matte des cartes */
      .matte-card {
        background-color: var(--card-matte);
        border: 1px solid var(--border-soft);
        border-radius: 32px;
        padding: 60px 40px;
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        text-align: center;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      }

      .matte-card:hover {
        border-color: rgba(255, 255, 255, 0.15);
        transform: scale(1.02);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      }

      /* Bouton Matte High-Contrast */
      .btn-matte {
        display: block;
        cursor: pointer;
        background-color: #ffffff;
        color: #000000;
        padding: 16px 40px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.9rem;
        letter-spacing: 0.05em;
        transition: all 0.4s ease;
        border: none;
        text-decoration: none;
      }

      .btn-matte:hover {
        background-color: #e0e0e0;
        transform: translateY(-2px);
        letter-spacing: 0.1em;
      }

      .subtitle {
        color: #666666;
        font-weight: 200;
        letter-spacing: 3px;
        text-transform: uppercase;
        font-size: 0.7rem;
      }

      h1 {
        font-weight: 600;
        letter-spacing: -1px;
      }
    </style>
  </head>
  <body>
    <div class="glow glow-top"></div>
    <div class="glow glow-bottom"></div>

    <div class="relative z-10 w-full max-w-5xl px-8">
      <header class="text-center mb-16" data-aos="fade-down">
        <h1 class="text-4xl md:text-5xl mb-3">Choose the template</h1>
        <p class="subtitle">Sélection de template • </p>
      </header>

      <div class="grid md:grid-cols-2 gap-8">
        <div class="matte-card" data-aos="fade-up-right">
          <a href="./T-1/index.html" class="btn-matte w-full">SÉLECTIONNER</a>
        </div>

        <div class="matte-card" data-aos="fade-up-left">
          <a href="./T-2/index.html" class="btn-matte w-full">SÉLECTIONNER</a>
        </div>
      </div>

      <footer class="mt-20 text-center" data-aos="fade-in" data-aos-delay="600">
        <p class="text-[10px] text-white/20 uppercase tracking-[5px]">
          Template by @S29Ducky
        </p>
      </footer>
    </div>

    <script>
      AOS.init({
        duration: 1200,
        once: true,
        easing: "ease-in-out",
      });
    </script>
  </body>
</html>
